# ═══════════════════════════════════════════════════════════════════════════
#  DRE Lab — Nginx Configuration
#  Static file serving + reverse proxy for ttyd terminals
# ═══════════════════════════════════════════════════════════════════════════

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 256;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - [$time_local] "$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # ── Gzip compression ────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json text/xml;
    gzip_min_length 256;
    gzip_vary on;

    # ── Upstream: ttyd terminal ─────────────────────────────────────────
    upstream sandbox_terminal {
        server sandbox-terminal:7681;
    }

    server {
        listen 80;
        server_name _;

        # ── Security headers ────────────────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # ── Static files (DRE Lab site) ─────────────────────────────────
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── Cache static assets ─────────────────────────────────────────
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1d;
            add_header Cache-Control "public, immutable";
        }

        # ── Terminal WebSocket proxy ────────────────────────────────────
        # ttyd serves its own HTML at / — we proxy under /terminal/
        location /terminal/ {
            proxy_pass http://sandbox_terminal/;
            proxy_http_version 1.1;

            # WebSocket support (critical for ttyd)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeout for long-lived connections
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── ttyd WebSocket endpoint (ws://) ─────────────────────────────
        location /terminal/ws {
            proxy_pass http://sandbox_terminal/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── ttyd token endpoint ─────────────────────────────────────────
        location /terminal/token {
            proxy_pass http://sandbox_terminal/token;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # ── Health check endpoint ───────────────────────────────────────
        location /health {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }
    }
}
