<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRE Labs - PostgreSQL Recovery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/xterm@5.3.0/css/xterm.css" />
    <script src="https://unpkg.com/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://unpkg.com/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark: #0d1117; --bg-glass: rgba(22, 27, 34, 0.8); --border-color: #30363d; --accent: #58a6ff; }
        body { background-color: var(--bg-dark); color: #c9d1d9; font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass-card { background: var(--bg-glass); backdrop-filter: blur(8px); border: 1px solid var(--border-color); border-radius: 12px; }
        .gradient-text { 
            background: linear-gradient(135deg, #58a6ff 0%, #bc8cff 100%); 
            -webkit-background-clip: text; 
            background-clip: text;
            -webkit-text-fill-color: transparent; 
        }
        .xterm-viewport::-webkit-scrollbar { width: 8px; }
        .xterm-viewport::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        .animate-slide { animation: slideIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="h-screen overflow-hidden">
    <div id="root" class="h-full"></div>

    <script>
        const { useState, useEffect, useRef } = React;
        const html = htm.bind(React.createElement);

        const SCENARIO = {
            title: "Восстановление после сбоя",
            description: "База данных PostgreSQL внезапно перестала отвечать. Проведите DRE-диагностику и восстановите работоспособность.",
            steps: [
                { 
                    id: 1, 
                    title: "Статус сервиса", 
                    task: "Проверьте статус службы postgresql через systemctl.",
                    theory: "Первым делом DRE обязан проверить 'Health' сервиса на уровне ОС.",
                    cmd: "systemctl status postgresql",
                    hint: "systemctl status postgresql"
                },
                { 
                    id: 2, 
                    title: "SQL Проверка", 
                    task: "Попробуйте выполнить psql -c 'SELECT 1;' для проверки коннекта.",
                    theory: "Даже если сервис 'alive', он может не принимать подключения (Zombie state).",
                    cmd: "psql -c 'SELECT 1;'",
                    hint: "psql -c 'SELECT 1;'"
                },
                { 
                    id: 3, 
                    title: "Фикс конфига", 
                    task: "Исправьте порт в конфиге и перезапустите сервис.",
                    theory: "Ошибка порта 5433 -> 5432. Мы имитируем исправление через systemctl start (после ложного исправления).",
                    cmd: "systemctl start postgresql",
                    hint: "systemctl start postgresql"
                }
            ]
        };

        function App() {
            const [stepIdx, setStepIdx] = useState(0);
            const [completed, setCompleted] = useState([]);
            const [pgState, setPgState] = useState({ active: false, port: 5433 });
            const terminalRef = useRef(null);
            const term = useRef(null);

            const handleCommand = (input) => {
                const cmd = input.trim();
                const step = SCENARIO.steps[stepIdx];

                if (cmd === 'help') {
                    term.current.writeln('Доступно: systemctl, psql, ls, help, reset');
                    return;
                }

                if (cmd === 'systemctl status postgresql') {
                    if (pgState.active) {
                        term.current.writeln('● postgresql.service - PostgreSQL RDBMS\r\n   Active: \x1b[1;32mactive (running)\x1b[0m');
                    } else {
                        term.current.writeln('○ postgresql.service - PostgreSQL RDBMS\r\n   Active: \x1b[1;31minactive (dead)\x1b[0m');
                    }
                    if (stepIdx === 0) advance();
                } else if (cmd.startsWith('psql')) {
                    if (pgState.active) {
                        term.current.writeln(' ?column? \r\n----------\r\n        1\r\n(1 row)');
                    } else {
                        term.current.writeln('\x1b[1;31mpsql: error: connection to server failed: Connection refused\x1b[0m');
                    }
                    if (stepIdx === 1) advance();
                } else if (cmd.includes('systemctl start')) {
                    setPgState({ ...pgState, active: true });
                    term.current.writeln('Starting PostgreSQL...');
                    setTimeout(() => {
                        term.current.writeln('\x1b[1;32mService started on port 5432\x1b[0m');
                        if (stepIdx === 2) advance();
                    }, 800);
                } else {
                    term.current.writeln(`bash: ${cmd}: command not found`);
                }
            };

            const advance = () => {
                setCompleted(prev => [...prev, SCENARIO.steps[stepIdx].id]);
                if (stepIdx < SCENARIO.steps.length - 1) {
                    setStepIdx(prev => prev + 1);
                } else {
                    setStepIdx(SCENARIO.steps.length); // Final state
                }
            };

            useEffect(() => {
                term.current = new Terminal({
                    cursorBlink: true,
                    fontSize: 14,
                    fontFamily: 'JetBrains Mono',
                    theme: { background: '#0d1117', foreground: '#c9d1d9', cursor: '#58a6ff' }
                });
                
                // Robust addon loading
                const FitAddonClass = (window.FitAddon && window.FitAddon.FitAddon) || 
                                     (window.TerminalAddonFit && window.TerminalAddonFit.FitAddon);
                
                if (FitAddonClass) {
                    const fit = new FitAddonClass();
                    term.current.loadAddon(fit);
                    term.current.open(terminalRef.current);
                    setTimeout(() => fit.fit(), 100);
                } else {
                    term.current.open(terminalRef.current);
                }

                term.current.writeln('\x1b[1;36mDRE EDUCATIONAL PLATFORM INITIALIZED\x1b[0m');
                term.current.writeln('System healthy. Postgres node: \x1b[1;33mdre-db-01\x1b[0m');
                term.current.write('\r\nuser@dre-node:~$ ');

                let input = '';
                term.current.onKey(({ key, domEvent }) => {
                    if (domEvent.keyCode === 13) {
                        term.current.write('\r\n');
                        handleCommand(input);
                        input = '';
                        term.current.write('user@dre-node:~$ ');
                    } else if (domEvent.keyCode === 8) {
                        if (input.length > 0) {
                            input = input.slice(0, -1);
                            term.current.write('\b \b');
                        }
                    } else if (key.charCodeAt(0) >= 32) {
                        input += key;
                        term.current.write(key);
                    }
                });
                return () => term.current.dispose();
            }, [stepIdx, pgState]);

            return html`
                <div class="flex flex-col h-screen">
                    <header class="h-14 border-b border-[#30363d] bg-[#161b22] flex items-center justify-between px-6">
                        <div class="flex items-center space-x-3">
                            <div class="w-8 h-8 rounded bg-blue-600 flex items-center justify-center font-bold text-white">D</div>
                            <span class="font-bold tracking-tight text-sm uppercase">DRE platform <span class="text-xs font-normal text-gray-500 ml-2">v1.2.0</span></span>
                        </div>
                        <div class="flex items-center space-x-4">
                            <div class="flex items-center space-x-2 text-xs text-gray-400">
                                <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                                <span>SIMULATOR CONNECTED</span>
                            </div>
                        </div>
                    </header>

                    <div class="flex-1 flex overflow-hidden">
                        <!-- Navigation -->
                        <aside class="w-64 border-r border-[#30363d] p-4 hidden md:block">
                            <h3 class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-6">Каталог Сценариев</h3>
                            <div class="space-y-1">
                                <div class="p-2 rounded bg-blue-500/10 text-[#58a6ff] text-xs font-semibold flex items-center space-x-2">
                                    <span>●</span> <span>Recovery Tactics</span>
                                </div>
                                <div class="p-2 rounded text-gray-500 text-xs hover:bg-gray-800 cursor-not-allowed">
                                    <span>○</span> <span>Sharding Setup</span>
                                </div>
                            </div>
                        </aside>

                        <!-- Main content -->
                        <main class="flex-1 flex flex-col bg-[#0d1117] relative">
                            <div class="flex-1 overflow-y-auto p-8">
                                <div class="max-w-3xl mx-auto space-y-8">
                                    <div class="space-y-2">
                                        <h2 class="text-3xl font-bold gradient-text">${SCENARIO.title}</h2>
                                        <p class="text-gray-400 text-sm italic">${SCENARIO.description}</p>
                                    </div>

                                    <div class="glass-card p-6 space-y-6 animate-slide">
                                        ${stepIdx < SCENARIO.steps.length ? html`
                                            <div class="space-y-4">
                                                <div class="flex items-center justify-between">
                                                    <span class="text-[10px] font-bold text-blue-400 uppercase tracking-widest px-2 py-1 bg-blue-400/10 rounded">Шаг ${SCENARIO.steps[stepIdx].id}</span>
                                                    <span class="text-[10px] text-gray-500">DRE-TACTIC-ID: 0x24</span>
                                                </div>
                                                <h3 class="text-xl font-bold text-white">${SCENARIO.steps[stepIdx].title}</h3>
                                                <p class="text-sm text-gray-300 leading-relaxed">${SCENARIO.steps[stepIdx].theory}</p>
                                                
                                                <div class="bg-blue-500/5 border-l-4 border-blue-500 p-4 rounded-r">
                                                    <p class="text-sm font-semibold text-white mb-1">ЗАДАЧА:</p>
                                                    <p class="text-sm text-blue-100">${SCENARIO.steps[stepIdx].task}</p>
                                                </div>

                                                <div class="text-[10px] text-gray-500 flex items-center space-x-1">
                                                    <span>💡</span> <span>Подсказка: ${SCENARIO.steps[stepIdx].hint}</span>
                                                </div>
                                            </div>
                                        ` : html`
                                            <div class="text-center py-8 space-y-4">
                                                <div class="text-5xl">🏆</div>
                                                <h3 class="text-2xl font-bold text-green-400">Сценарий выполнен успешно!</h3>
                                                <p class="text-sm text-gray-400">Вы восстановили PostgreSQL и подтвердили навыки Data Reliability Engineering.</p>
                                                <button onClick=${() => window.location.reload()} class="px-6 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-lg text-sm font-bold transition-all">Начать заново</button>
                                            </div>
                                        `}
                                    </div>
                                </div>
                            </div>

                            <!-- Terminal Container -->
                            <div class="h-72 border-t border-[#30363d] bg-black/50 flex flex-col">
                                <div class="px-4 h-8 bg-[#161b22] border-b border-[#30363d] flex items-center justify-between">
                                    <div class="flex space-x-2">
                                        <div class="w-3 h-3 rounded-full bg-red-500/50"></div>
                                        <div class="w-3 h-3 rounded-full bg-yellow-500/50"></div>
                                        <div class="w-3 h-3 rounded-full bg-green-500/50"></div>
                                    </div>
                                    <span class="text-[10px] text-gray-500 font-mono tracking-tighter">bash — 80x24</span>
                                </div>
                                <div ref=${terminalRef} class="flex-1 p-2 xterm-container"></div>
                            </div>
                        </main>

                        <!-- Progress sidebar -->
                        <aside class="w-80 border-l border-[#30363d] p-6 bg-[#0d1117] hidden xl:block">
                            <h3 class="text-xs font-bold text-gray-400 mb-6 uppercase tracking-wider">Ваш Прогресс</h3>
                            <div class="space-y-4">
                                ${SCENARIO.steps.map((s, idx) => html`
                                    <div key=${s.id} class="flex items-start space-x-4">
                                        <div class="w-6 h-6 rounded-full border-2 flex items-center justify-center flex-shrink-0 transition-all ${completed.includes(s.id) ? 'bg-green-500 border-green-500' : idx === stepIdx ? 'border-blue-500 text-blue-500' : 'border-[#30363d] text-gray-600'}">
                                            ${completed.includes(s.id) ? html`<span>✓</span>` : html`<span class="text-[10px]">${s.id}</span>`}
                                        </div>
                                        <div class="space-y-1">
                                            <p class="text-sm font-semibold transition-all ${idx === stepIdx ? 'text-white' : 'text-gray-500'}">${s.title}</p>
                                            ${idx === stepIdx && html`
                                                <div class="flex items-center space-x-2">
                                                    <div class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></div>
                                                    <p class="text-[10px] text-blue-500 font-bold uppercase">В процессе</p>
                                                </div>
                                            `}
                                        </div>
                                    </div>
                                `)}
                            </div>
                        </aside>
                    </div>
                </div>
            `;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
