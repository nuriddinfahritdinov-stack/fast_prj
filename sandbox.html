<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRE PostgreSQL Lab - Песочница</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'JetBrains Mono', monospace; background: #000; color: #fff; }
        @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }
        .cursor { display: inline-block; width: 10px; height: 1.2em; background: #fff; animation: blink 1s step-end infinite; vertical-align: text-bottom; margin-left: 2px; }
        .scan { background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.02) 2px, rgba(255,255,255,0.02) 4px); }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-center scan">

    <div class="text-center px-6 max-w-lg">
        <!-- Icon -->
        <div class="text-7xl mb-6 select-none">🚧</div>

        <!-- Status line -->
        <p class="text-xs tracking-widest text-gray-500 uppercase mb-2">
            STATUS: <span class="text-yellow-400">UNDER CONSTRUCTION</span>
        </p>

        <h1 class="text-2xl font-bold tracking-tighter uppercase italic mb-4">
            Section Unavailable<span class="cursor"></span>
        </h1>

        <p class="text-gray-500 text-sm leading-relaxed mb-8">
            Песочница временно недоступна.<br>
            Мы настраиваем изоляцию контейнеров и среду выполнения.
        </p>

        <!-- Terminal-style message -->
        <div class="text-left bg-gray-950 border border-gray-800 rounded-lg p-4 text-xs text-green-400 mb-8 font-mono">
            <p><span class="text-gray-600">$</span> docker ps --filter "name=sandbox"</p>
            <p class="text-gray-600 mt-1">CONTAINER ID   IMAGE   ...</p>
            <p class="text-yellow-500 mt-1">// No containers running. Setup in progress.</p>
        </div>

        <a href="index.html"
           class="inline-block px-8 py-2 border border-white text-xs tracking-widest uppercase
                  hover:bg-white hover:text-black transition-all duration-200">
            ← Вернуться
        </a>
    </div>

    <footer class="absolute bottom-6 text-xs text-gray-700 tracking-widest uppercase">
        DRE Lab · Sandbox
    </footer>
</body>
</html>
