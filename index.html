<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRE PostgreSQL Lab - Welcome</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; }
        .card { transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(59,130,246,0.2); }
    </style>
</head>
<body class="h-screen flex items-center justify-center">
    <div class="text-center max-w-2xl px-4">

        <!-- Logo -->
        <div class="mb-8 inline-block p-5 rounded-2xl bg-blue-600 shadow-2xl shadow-blue-500/30">
            <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"/>
            </svg>
        </div>

        <h1 class="text-5xl font-bold mb-3 tracking-tight">DRE PostgreSQL Lab</h1>
        <p class="text-slate-400 text-lg mb-10">
            Добро пожаловать в симулятор инженера баз данных.<br>
            Выберите раздел для начала работы.
        </p>

        <!-- Navigation Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <a href="theory.html"
               class="card p-6 bg-slate-800 rounded-2xl border border-slate-700 hover:border-blue-500 group block text-left">
                <div class="w-10 h-10 rounded-lg bg-slate-700 group-hover:bg-blue-600 flex items-center justify-center mb-4 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
                    </svg>
                </div>
                <h3 class="text-lg font-semibold mb-1 group-hover:text-blue-400 transition-colors">Теория</h3>
                <p class="text-sm text-slate-500">Техническое задание и контекст</p>
            </a>

            <a href="lab.html"
               class="card p-6 bg-slate-800 rounded-2xl border border-slate-700 hover:border-blue-500 group block text-left">
                <div class="w-10 h-10 rounded-lg bg-slate-700 group-hover:bg-blue-600 flex items-center justify-center mb-4 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                    </svg>
                </div>
                <h3 class="text-lg font-semibold mb-1 group-hover:text-blue-400 transition-colors">Обучение</h3>
                <p class="text-sm text-slate-500">Интерактивные практические задания</p>
            </a>

            <a href="sandbox.html"
               class="card p-6 bg-slate-800 rounded-2xl border border-slate-700 hover:border-blue-500 group block text-left">
                <div class="w-10 h-10 rounded-lg bg-slate-700 group-hover:bg-blue-600 flex items-center justify-center mb-4 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/>
                    </svg>
                </div>
                <h3 class="text-lg font-semibold mb-1 group-hover:text-blue-400 transition-colors">Песочница</h3>
                <p class="text-sm text-slate-500">Свободный режим</p>
            </a>
        </div>

        <p class="mt-10 text-xs text-slate-600 tracking-widest uppercase">DRE Lab · v2.0</p>
    </div>
</body>
</html>
