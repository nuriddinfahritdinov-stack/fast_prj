<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRE PostgreSQL Lab - Песочница</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- Shared Theme Engine -->
    <link rel="stylesheet" href="theme.css">
    <script src="theme.js"></script>
    <style>
        body { font-family: var(--font-mono); }
        @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }
        .cursor { display: inline-block; width: 10px; height: 1.2em; background: var(--text-primary); animation: blink 1s step-end infinite; vertical-align: text-bottom; margin-left: 2px; }
        .scan { background: repeating-linear-gradient(0deg, transparent, transparent 2px, color-mix(in srgb, var(--text-primary) 5%, transparent) 2px, color-mix(in srgb, var(--text-primary) 5%, transparent) 4px); }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-center scan">

    <div class="text-center px-6 max-w-lg">
        <!-- Icon -->
        <div class="text-7xl mb-6 select-none opacity-80">🚧</div>

        <!-- Status line -->
        <p class="text-xs tracking-widest uppercase mb-2" style="color: var(--text-secondary)">
            STATUS: <span style="color: var(--accent)">UNDER CONSTRUCTION</span>
        </p>

        <h1 class="text-2xl font-bold tracking-tighter uppercase italic mb-4" style="color: var(--text-primary)">
            Section Unavailable<span class="cursor"></span>
        </h1>

        <p class="text-sm leading-relaxed mb-8" style="color: var(--text-secondary)">
            Песочница временно недоступна.<br>
            Мы настраиваем изоляцию контейнеров и среду выполнения.
        </p>

        <!-- Terminal-style message -->
        <div class="text-left border rounded-lg p-4 text-xs mb-8" style="background: var(--pre-bg); border-color: var(--border); color: var(--pre-color); font-family: var(--font-mono);">
            <p><span style="color: var(--text-secondary)">$</span> docker ps --filter "name=sandbox"</p>
            <p class="mt-1" style="color: var(--text-secondary)">CONTAINER ID   IMAGE   ...</p>
            <p class="mt-1" style="color: var(--accent)">// No containers running. Setup in progress.</p>
        </div>

        <a href="index.html"
           class="inline-block px-8 py-2 border text-xs tracking-widest uppercase transition-all duration-200"
           style="border-color: var(--border); color: var(--text-primary); background: transparent;"
           onmouseover="this.style.background='var(--text-primary)'; this.style.color='var(--bg-primary)'"
           onmouseout="this.style.background='transparent'; this.style.color='var(--text-primary)'">
            ← Вернуться
        </a>
    </div>

    <footer class="absolute bottom-6 text-xs tracking-widest uppercase" style="color: var(--text-secondary)">
        DRE Lab · Sandbox
    </footer>
</body>
</html>
