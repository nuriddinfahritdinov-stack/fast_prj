<script>
const { useState, useEffect, useRef, useCallback } = React;
const html = htm.bind(React.createElement);

// ── Simulated Filesystem ────────────────────────────────────────────────────
const FS = {
    '~':                       { type:'dir', children:['projects','docs','data'] },
    '/':                       { type:'dir', children:['etc','var','run','home','tmp','u01'] },
    '/etc':                    { type:'dir', children:['postgresql','mongod.conf','hosts','passwd'] },
    '/etc/postgresql/15/main': { type:'dir', children:['postgresql.conf','pg_hba.conf'] },
    '/var/log/mongodb':        { type:'dir', children:['mongod.log'] },
    '/u01/app/oracle':         { type:'dir', children:['product'] },
};

function resolvePath(cwd, target) {
    if (!target || target === '~') return '~';
    if (target === '/') return '/';
    if (target === '..') {
        if (cwd === '~' || cwd === '/') return cwd;
        const parts = cwd.split('/').filter(Boolean);
        return parts.length === 1 ? '/' : '/' + parts.slice(0, -1).join('/');
    }
    if (target.startsWith('/')) return target.replace(/\/$/, '') || '/';
    if (cwd === '~') return '~/' + target;
    return (cwd + '/' + target).replace(/\/$/, '');
}

// ── Command Simulator ───────────────────────────────────────────────────────
function simulate(rawCmd, cwd) {
    const cmd   = rawCmd.trim();
    if (!cmd) return { output: '', newCwd: null };
    const lower = cmd.toLowerCase();
    const parts = cmd.split(/\s+/);
    const base  = parts[0].toLowerCase();
    let output  = '';
    let newCwd  = null;

    if (base === 'clear') return { output: '__CLEAR__', newCwd: null };
    if (base === 'pwd') { output = cwd === '~' ? '/home/user' : cwd; }
    else if (base === 'cd') {
        const target = parts[1] || '~';
        const resolved = resolvePath(cwd, target);
        if (FS[resolved] || resolved.includes('postgresql') || resolved.includes('u01')) {
            newCwd = resolved;
            output = '';
        } else { output = `bash: cd: ${target}: No such file or directory`; }
    }
    else if (base === 'ls') {
        const pathArg = parts.slice(1).find(p => !p.startsWith('-'));
        const target  = pathArg ? resolvePath(cwd, pathArg) : cwd;
        const entry   = FS[target];
        if (entry) {
            output = (entry.children || []).join('  ');
        } else { output = `ls: cannot access '${pathArg || cwd}': No such file or directory`; }
    }
    else if (base === 'cat') {
        const f = parts[1] || '';
        if (f.includes('postgresql.conf')) {
            output = `listen_addresses = 'localhost'\nport = 5432\nshared_buffers = 128MB`;
        } else if (f.includes('mongod.conf')) {
            output = `storage:\n  dbPath: /var/lib/mongodb\nsystemLog:\n  destination: file\n  path: /var/log/mongodb/mongod.log\nnet:\n  port: 27017`;
        } else if (f.includes('mongod.log')) {
            output = `2024-03-30T21:00:01.000+0000 I  CONTROL  [main] Automatically disabling TLS 1.0, 1.1`;
        } else { output = `cat: ${f}: No such file or directory`; }
    }
    else if (base === 'echo') {
        if (cmd.includes('$ORACLE_SID')) output = 'ORCL';
        else if (cmd.includes('$MONGO_URI')) output = 'mongodb://localhost:27017';
        else output = parts.slice(1).join(' ');
    }
    else if (base === 'psql') {
        if (lower.includes('version')) output = 'psql (PostgreSQL) 15.3';
        else output = 'psql (15.3)\npostgres=# ';
    }
    else if (lower.includes('show config_file')) {
        output = '/etc/postgresql/15/main/postgresql.conf';
    }
    else if (base === 'df') {
        output = `Filesystem     Size  Used Avail Use% Mounted on\n/dev/sda1       50G   20G   30G  40% /`;
    }
    else if (base === 'grep') {
        if (cmd.includes('shared_buffers')) output = "shared_buffers = 128MB";
        else output = "(grep simulation)";
    }
    // Oracle
    else if (lower.includes('v$instance')) {
        output = "STATUS\n------\nOPEN";
    }
    // MongoDB Shell & Commands
    else if (base === 'mongosh') {
        if (lower.includes('version')) output = 'mongosh: 2.1.1';
        else if (lower.includes('--eval')) {
            if (lower.includes('ping')) output = '{ ok: 1 }';
            else if (lower.includes('rs.status')) output = `{ set: 'rs0', members: [{ name: 'localhost:27017', stateStr: 'PRIMARY' }] }`;
            else if (lower.includes('ismaster')) output = `{ ismaster: true, maxBsonObjectSize: 16777216 }`;
            else output = '(mongosh: evaluation completed)';
        }
        else output = 'Connected to: mongodb://127.0.0.1:27017/\ntest> ';
    }
    else if (lower.includes('db.admincommand') || lower.includes('rs.status') || lower.includes('db.ismaster')) {
        output = `bash: command not found (hint: use mongosh or mongosh --eval)`;
    }
    else if (base === 'help') {
        output = `Commands: cd, ls, pwd, cat, echo, grep, df, psql, mongosh, rs.status()...`;
    }
    else {
        output = `bash: ${parts[0]}: command not found`;
    }

    return { output, newCwd };
}

// ── Helpers ─────────────────────────────────────────────────────────────────
function postgresConf() {
    return `# postgresql.conf
# Line 1: listen_addresses = 'localhost'
# Line 2: port = 5432
max_connections = 100
shared_buffers = 128MB
work_mem = 4MB
wal_buffers = 16MB
effective_cache_size = 4GB
checkpoint_completion_target = 0.9
log_directory = '/var/log/postgresql'
log_filename = 'postgresql.log'
log_line_prefix = '[%t] '
log_min_messages = warning
log_min_error_statement = error`;
}

function simulateLog() {
    return `[2024-03-30 20:55:01] LOG:   database system was shut down at 2024-03-30 20:55:00 +05
[2024-03-30 20:55:02] LOG:   database system is ready to accept connections
[2024-03-30 21:00:01] LOG:   checkpoint starting: time
[2024-03-30 21:00:03] LOG:   checkpoint complete: wrote 142 buffers (0.9%)
[2024-03-30 21:03:50] WARNING: out of shared memory
[2024-03-30 21:04:00] LOG:   autovacuum: processing database "appdb"
[2024-03-30 21:05:12] ERROR:  could not write to file "base/16384/16385": No space left on device
[2024-03-30 21:05:13] HINT:   Check free disk space with df -h /var/lib/postgresql
[2024-03-30 21:05:20] FATAL:  terminating connection due to administrator command
[2024-03-30 21:05:21] LOG:   database system is shut down`;
}

function handleGrep(cmd, cwd) {
    const parts = cmd.match(/grep\s+((?:-\w+\s+)*)'?([^']+)'?\s+(.*)/);
    const flags  = cmd.match(/-[a-zA-Z]+/g) || [];
    const flagStr = flags.join('');
    const hasN    = flagStr.includes('n');
    const hasI    = flagStr.includes('i');
    const hasC    = flagStr.includes('c');
    const hasV    = flagStr.includes('v');
    const lc      = cmd.toLowerCase();

    // Determine what file/content to search
    let content = '';
    if (lc.includes('postgresql.conf')) content = postgresConf();
    else if (lc.includes('postgresql.log') || cwd === '/var/log/postgresql') content = simulateLog();
    else content = postgresConf(); // default

    // Extract pattern (rough heuristic)
    const patMatch = cmd.match(/grep\s+(?:-[\w]+\s+)*'?([^'\s]+)'?\s+/);
    const pattern = patMatch ? patMatch[1] : '';
    if (!pattern) return '(grep: укажите паттерн и файл)';

    let lines = content.split('\n');
    const re = new RegExp(pattern, hasI ? 'i' : '');
    let matched = lines.filter(l => hasV ? !re.test(l) : re.test(l));

    if (hasC) return String(matched.length);
    if (hasN) matched = matched.map((l,i) => `${lines.indexOf(l)+1}:${l}`);

    return matched.join('\n') || '(нет совпадений)';
}

function handleAwk(cmd) {
    const lc = cmd.toLowerCase();
    const rangeMatch = cmd.match(/NR>=(\d+)\s*&&\s*NR<=(\d+)/);
    if (rangeMatch) {
        const [,from,to] = rangeMatch.map(Number);
        return postgresConf().split('\n').slice(from-1, to).join('\n');
    }
    if (lc.includes('shared_buffers')) return 'shared_buffers = 128MB\n(значение: 128MB)';
    if (lc.includes('nrp') || cmd.includes('{print NR, $0}')) {
        return postgresConf().split('\n').map((l,i) => `${i+1} ${l}`).join('\n');
    }
    if (lc.includes('sum')) return '(awk: сумма полей — поддерживается в реальной системе)';
    return postgresConf().split('\n').filter(l => l && !l.startsWith('#')).join('\n');
}

function handlePipe(cmd, cwd) {
    // Very simplified pipe: run left side simulation, return note
    const sides = cmd.split('|').map(s => s.trim());
    const firstCmd = sides[0];
    const firstResult = simulate(firstCmd, cwd);
    const firstOut = firstResult.output || '';

    const secondBase = sides[1].split(/\s+/)[0].toLowerCase();
    if (secondBase === 'grep') {
        const patMatch = sides[1].match(/grep\s+(?:-\w+\s+)*'?([^'\s]+)'?/);
        const pattern  = patMatch ? patMatch[1] : '';
        if (!pattern) return firstOut;
        const re = new RegExp(pattern, 'i');
        return firstOut.split('\n').filter(l => re.test(l)).join('\n') || '(нет совпадений)';
    }
    if (secondBase === 'tail') {
        const nMatch = sides[1].match(/-n\s*(\d+)/);
        const n = nMatch ? parseInt(nMatch[1]) : 10;
        const lines = firstOut.split('\n');
        return lines.slice(-n).join('\n');
    }
    if (secondBase === 'head') {
        const nMatch = sides[1].match(/-n\s*(\d+)/);
        const n = nMatch ? parseInt(nMatch[1]) : 10;
        return firstOut.split('\n').slice(0, n).join('\n');
    }
    if (secondBase === 'wc') return String(firstOut.split('\n').length);
    if (secondBase === 'sort') return firstOut.split('\n').sort().join('\n');

    return firstOut + '\n\x1b[90m(вторая часть pipe выполнена)\x1b[0m';
}

// ═══════════════════════════════════════════════════════════════════════════
//  REACT COMPONENTS
// ═══════════════════════════════════════════════════════════════════════════

function Navbar({ currentTheme, setTheme, moduleIdx, setModuleIdx }) {
    return html`
        <header class="h-14 border-b border-custom bg-custom-sec flex items-center justify-between px-6 z-10 shrink-0">
            <div class="flex items-center space-x-6">
                <a href="index.html" class="flex items-center space-x-2 group">
                    <div class="w-8 h-8 rounded accent-bg flex items-center justify-center font-bold text-white shadow-lg text-sm">P</div>
                    <span class="font-bold tracking-tight text-sm uppercase group-hover:opacity-75 transition-opacity">DRE Lab</span>
                </a>
                <nav class="flex space-x-1">
                    <span class="text-xs font-semibold px-3 py-1 rounded accent-bg text-white">Обучение</span>
                    <a href="theory.html" class="text-xs font-semibold px-3 py-1 rounded text-custom-sec hover:opacity-100 opacity-60 transition-opacity">Теория</a>
                    <a href="sandbox.html" class="text-xs font-semibold px-3 py-1 rounded text-custom-sec hover:opacity-100 opacity-60 transition-opacity">Песочница</a>
                </nav>
            </div>
            <div class="flex items-center space-x-3">
                <!-- Module selector -->
                <select
                    value=${moduleIdx}
                    onChange=${e => { const urls = ["01_Bash_Lab.html", "02_PostgreSQL_Lab.html", "03_Oracle_Lab.html", "04_MongoDB_Lab.html"]; window.location.href = urls[Number(e.target.value)]; }}
                    class="bg-custom-sec border border-custom text-[10px] rounded px-2 py-1 outline-none cursor-pointer"
                >
                    ${CURRICULUM.modules.map((m, i) => html`<option key=${m.id} value=${i}>${m.name}</option>`)}
                </select>
                <!-- Theme selector -->
                <select
                    value=${currentTheme}
                    onChange=${e => setTheme(e.target.value)}
                    class="bg-custom-sec border border-custom text-[10px] rounded px-2 py-1 outline-none cursor-pointer"
                >
                    ${(window.DRETheme ? window.DRETheme.themes : []).map(t => html`<option key=${t.id} value=${t.id}>${t.name}</option>`)}
                </select>
            </div>
        </header>
    `;
}

function StepPill({ idx, task, active, done, onClick }) {
    const base = "w-full text-left px-3 py-2 rounded-lg text-xs font-medium transition-all mb-1 flex items-center gap-2";
    const cls  = active ? `${base} accent-bg text-white`
               : done   ? `${base} opacity-55 text-custom-sec`
               :           `${base} text-custom-sec hover:opacity-80 cursor-pointer`;
    return html`
        <button class=${cls} onClick=${!active ? onClick : undefined} disabled=${active}>
            <span class="shrink-0 w-4 h-4 rounded-full border text-[9px] flex items-center justify-center
                         ${done ? 'bg-green-500 border-green-500 text-white' : active ? 'border-white' : 'border-current opacity-40'}">
                ${done ? '✓' : idx+1}
            </span>
            <span class=${done ? 'line-through' : ''}>${task.title}</span>
        </button>
    `;
}

function SuccessBanner({ task, onNext, isLast }) {
    return html`
        <div class="badge-pop mx-4 mb-3 p-3 rounded-xl border-2 border-green-500 bg-green-500/10 text-green-400 text-sm">
            <p class="font-bold mb-1">✔ Задание выполнено!</p>
            ${task.validPaths ? html`
                <p class="text-[11px] opacity-75 mb-2">Допустимые способы решения:</p>
                <ul class="text-[10px] opacity-70 list-disc pl-4 mb-2 font-mono space-y-0.5">
                    ${task.validPaths.map((p,i) => html`<li key=${i}>${p}</li>`)}
                </ul>
            ` : null}
            ${!isLast ? html`
                <button onClick=${onNext}
                    class="mt-1 px-4 py-1.5 bg-green-500 text-black rounded-lg text-xs font-bold hover:bg-green-400 transition-colors">
                    Следующее задание →
                </button>
            ` : html`
                <p class="font-semibold text-green-300">🎉 Модуль завершён!</p>
            `}
        </div>
    `;
}

// ── Main App ────────────────────────────────────────────────────────────────
function App() {
    const [currentTheme, setCurrentTheme] = useState(window.DRETheme ? window.DRETheme.get() : 'dracula');
    const [moduleIdx,    setModuleIdx]    = useState(3);
    const [taskIdx,      setTaskIdx]      = useState(0);
    const [cwd,          setCwd]          = useState('~');
    const [hint,         setHint]         = useState(false);
    const [taskDone,     setTaskDone]     = useState(false);

    const termRef  = useRef(null);
    const term     = useRef(null);
    const fitAddon = useRef(null);
    const cwdRef   = useRef(cwd);
    cwdRef.current = cwd;

    const taskIdxRef = useRef(taskIdx);
    taskIdxRef.current = taskIdx;

    const moduleIdxRef = useRef(moduleIdx);
    moduleIdxRef.current = moduleIdx;

    const module      = CURRICULUM.modules[moduleIdx];
    const currentTask = module.tasks[taskIdx];

    const updateTerminalTheme = useCallback((id) => {
        if (!term.current) return;
        const colors = {
            dracula:   { bg:'#1e1f29', fg:'#f8f8f2' },
            cyberpunk: { bg:'#000', fg:'#00ff41' },
            default:   { bg:'#000', fg:'#fff' },
            academic:  { bg:'#1a1a1a', fg:'#f4f1ea' },
            contrast:  { bg:'#000', fg:'#fff' },
        };
        const c = colors[id] || colors.default;
        term.current.options.theme = { background: c.bg, foreground: c.fg };
    }, []);

    const applyTheme = (id) => {
        if (window.DRETheme) {
            window.DRETheme.set(id);
        } else {
            setCurrentTheme(id);
            updateTerminalTheme(id);
        }
    };

    useEffect(() => {
        const handleThemeChange = (e) => {
            setCurrentTheme(e.detail.theme);
            updateTerminalTheme(e.detail.theme);
        };
        window.addEventListener('dre-theme-changed', handleThemeChange);
        return () => window.removeEventListener('dre-theme-changed', handleThemeChange);
    }, [updateTerminalTheme]);

    useEffect(() => {
        updateTerminalTheme(currentTheme);
    }, [currentTheme, updateTerminalTheme]);

    // Reset task state when switching module or task
    useEffect(() => {
        setTaskDone(false);
        setHint(false);
    }, [moduleIdx, taskIdx]);

    // ── Command handler (used inside xterm onKey) ─────────────────────────
    const handleCommandRef = useRef(null);
    handleCommandRef.current = (rawInput) => {
        const result = simulate(rawInput, cwdRef.current);

        if (result.output === '__CLEAR__') {
            term.current.clear();
            term.current.write(`user@mongo-db:${cwdRef.current}$ `);
            return;
        }

        if (result.newCwd !== null) {
            cwdRef.current = result.newCwd;
            setCwd(result.newCwd);
        }

        if (result.output) {
            result.output.split('\n').forEach(line => term.current.writeln(line));
        }

        // Task check
        const mod  = CURRICULUM.modules[moduleIdxRef.current];
        const task = mod.tasks[taskIdxRef.current];
        const check = task.check(rawInput.trim(), {
            cwd:    result.newCwd !== null ? result.newCwd : cwdRef.current,
            output: result.output || '',
        });

        if (check && !taskIdxRef.current._done) {
            term.current.writeln('\r\n\x1b[1;32m[✔] Задание выполнено! Смотрите панель слева.\x1b[0m');
            setTaskDone(true);
        }
    };

    // ── xterm init ───────────────────────────────────────────────────────
    useEffect(() => {
        if (term.current) return;

        term.current = new Terminal({
            cursorBlink: true,
            fontSize: 14,
            fontFamily: "'JetBrains Mono', monospace",
            theme: { background:'#1e1f29', foreground:'#f8f8f2' },
            scrollback: 1000,
        });

        fitAddon.current = new FitAddon.FitAddon();
        term.current.loadAddon(fitAddon.current);
        term.current.open(termRef.current);
        fitAddon.current.fit();

        term.current.writeln('\x1b[1;35mDRE MongoDB Lab — v2.1.0\x1b[0m');
        term.current.writeln('\x1b[90mТип "help" для списка команд. Ctrl+L — очистить.\x1b[0m');
        term.current.write('\r\nuser@mongo-db:~$ ');

        let inputBuf = '';

        term.current.onKey(({ key, domEvent }) => {
            const code = domEvent.keyCode;

            if (domEvent.ctrlKey && (code === 76 || key === '\f')) {
                term.current.clear();
                term.current.write(`user@mongo-db:${cwdRef.current}$ `);
                inputBuf = '';
                return;
            }
            if (code === 13) {
                term.current.write('\r\n');
                handleCommandRef.current(inputBuf);
                inputBuf = '';
                term.current.write(`user@mongo-db:${cwdRef.current}$ `);
            } else if (code === 8) {
                if (inputBuf.length > 0) { inputBuf = inputBuf.slice(0,-1); term.current.write('\b \b'); }
            } else if (key.charCodeAt(0) >= 32) {
                inputBuf += key; term.current.write(key);
            }
        });

        const ro = new ResizeObserver(() => fitAddon.current && fitAddon.current.fit());
        ro.observe(termRef.current);
        return () => ro.disconnect();
    }, []);

    // ── Global task counters ─────────────────────────────────────────────
    const totalTasks   = CURRICULUM.modules.reduce((s, m) => s + m.tasks.length, 0);
    const passedModules = CURRICULUM.modules.slice(0, moduleIdx);
    const globalIdx    = passedModules.reduce((s, m) => s + m.tasks.length, 0) + taskIdx + 1;

    // ── Render ───────────────────────────────────────────────────────────
    return html`
        <div class="flex flex-col h-screen">

            <${Navbar}
                currentTheme=${currentTheme} setTheme=${applyTheme}
                moduleIdx=${moduleIdx} setModuleIdx=${(i) => { setModuleIdx(i); setTaskIdx(0); }}
            />

            <!-- Breadcrumbs -->
            <div class="px-6 py-2 border-b border-custom bg-custom-sec text-[10px] flex items-center space-x-2 text-custom-sec uppercase tracking-widest shrink-0">
                <span>Модули</span><span>/</span>
                <span>${module.name}</span><span>/</span>
                <span class="accent-color font-bold">${currentTask.title}</span>
                <span class="ml-auto font-mono">${globalIdx}/${totalTasks}</span>
            </div>

            <div class="flex-1 flex overflow-hidden">

                <!-- ── Left panel ───────────────── -->
                <aside class="w-[45%] border-r border-custom flex flex-col bg-custom-sec min-w-0">

                    <!-- Step pills -->
                    <div class="border-b border-custom px-3 py-3 shrink-0">
                        ${module.tasks.map((t, i) => html`
                            <${StepPill} key=${t.id} idx=${i} task=${t}
                                active=${i === taskIdx}
                                done=${i < taskIdx}
                                onClick=${() => setTaskIdx(i)} />
                        `)}
                    </div>

                    <!-- Theory -->
                    <div class="flex-1 overflow-y-auto p-6 animate-fade">
                        <div class="max-w-prose mx-auto theory-content">
                            <div dangerouslySetInnerHTML=${{ __html: currentTask.theoryHTML }}
                                 class="prose" />
                        </div>
                    </div>

                    <!-- Success banner -->
                    ${taskDone ? html`
                        <${SuccessBanner}
                            task=${currentTask}
                            isLast=${taskIdx === module.tasks.length - 1}
                            onNext=${() => setTaskIdx(p => p + 1)}
                        />
                    ` : null}

                    <!-- Hint -->
                    <div class="border-t border-custom px-5 py-3 shrink-0 flex items-center justify-between">
                        <button onClick=${() => setHint(h => !h)}
                            class="text-xs text-custom-sec hover:opacity-80 transition-opacity underline">
                            ${hint ? 'Скрыть подсказку' : '💡 Показать подсказку'}
                        </button>
                        ${hint ? html`<code class="text-xs accent-color ml-3 font-mono">${currentTask.hint}</code>` : null}
                    </div>
                </aside>

                <!-- ── Terminal ──────────────────── -->
                <main class="flex-1 flex flex-col bg-black min-w-0">
                    <div class="flex-1 p-2 overflow-hidden">
                        <div ref=${termRef} class="h-full w-full" />
                    </div>
                </main>
            </div>

            <!-- ── Footer navigator ───────────────── -->
            <footer class="h-14 border-t border-custom bg-custom-sec flex items-center justify-between px-6 shrink-0">
                <div class="flex space-x-2">
                    <button
                        onClick=${() => { setTaskIdx(p => Math.max(0, p-1)); }}
                        class="px-4 py-1.5 border border-custom rounded text-xs font-bold hover:opacity-80 disabled:opacity-30 transition-opacity"
                        disabled=${taskIdx === 0}
                    >← Назад</button>
                    <button
                        onClick=${() => { setTaskIdx(p => Math.min(module.tasks.length-1, p+1)); }}
                        class="px-4 py-1.5 border border-custom rounded text-xs font-bold hover:opacity-80 disabled:opacity-30 transition-opacity"
                        disabled=${taskIdx === module.tasks.length - 1}
                    >Далее →</button>
                </div>
                <div class="flex items-center space-x-4">
                    <span class="text-[10px] text-custom-sec mono uppercase tracking-widest">
                        ${taskIdx+1} / ${module.tasks.length}
                    </span>
                    <div class="w-36 h-1.5 bg-slate-700 rounded-full overflow-hidden">
                        <div class="h-full accent-bg rounded-full transition-all"
                             style=${{ width: `${((taskIdx+1)/module.tasks.length)*100}%` }} />
                    </div>
                </div>
            </footer>

        </div>
    `;
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
